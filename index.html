<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnus - ניהול חכם של אירועים</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="protocols_kb.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mn: {
                            950: '#080808',
                            900: '#0E0E0E',
                            800: '#161616',
                            700: '#1E1E1E',
                            600: '#2A2A2A',
                            500: '#363636',
                            gold:  '#E8820C',
                            goldh: '#F59520',
                            goldd: '#C46A08',
                            t:   '#F0F0F0',
                            tm:  '#9A9A9A',
                            td:  '#555555',
                        }
                    },
                    fontFamily: {
                        sans: ['Heebo', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Heebo', system-ui, -apple-system, sans-serif; background-color: #0E0E0E; color: #F0F0F0; }
        .incident-card { transition: all 0.3s ease; }
        .incident-card.closed-anim { opacity: 0; transform: scale(0.95); }
        .incident-card.closed-event { opacity: 0.5; filter: grayscale(50%); }
        .incident-card.closed-event:hover { opacity: 0.65; filter: grayscale(30%); }
        .line-new { background: rgba(232,130,12,0.1); border-right: 2px solid #E8820C; }
        .task-fade { animation: fadeOut 0.4s forwards; }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(10px); } }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .blink-red { animation: pulse-red 2s infinite; }
        @keyframes alert-glow { 0%, 100% { box-shadow: 0 0 20px rgba(232,130,12,0.5); } 50% { box-shadow: 0 0 70px rgba(232,130,12,1); } }
        .alert-glow { animation: alert-glow 0.9s infinite; }
        .scroll-thin::-webkit-scrollbar { width: 6px; }
        .scroll-thin::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 3px; }
        details > summary { list-style: none; cursor: pointer; }
        details > summary::-webkit-details-marker { display: none; }
        /* SuperMagnus Chat */
        .sm-panel { transition: transform 0.35s cubic-bezier(.2,.8,.2,1); will-change: transform; }
        .sm-panel.closed { transform: translateX(-110%); }
        .sm-backdrop { transition: opacity 0.3s ease; }
        .sm-fab { transition: transform 0.2s ease, box-shadow 0.2s ease; box-shadow: 0 10px 30px rgba(232,130,12,0.4); }
        .sm-fab:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(232,130,12,0.6); }
        .sm-msg-bubble { animation: sm-in 0.22s ease-out; }
        @keyframes sm-in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        .sm-typing span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #E8820C; margin: 0 2px; animation: sm-dot 1s infinite ease-in-out; }
        .sm-typing span:nth-child(2) { animation-delay: 0.15s; }
        .sm-typing span:nth-child(3) { animation-delay: 0.3s; }
        @keyframes sm-dot { 0%,80%,100% { transform: scale(0.5); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }
        /* Magnus brand header style */
        .magnus-header { border-bottom: 1px solid #222; }
        .magnus-header::before { content: ''; display: block; height: 3px; background: #E8820C; }
        /* Card hover glow */
        .incident-card:hover { box-shadow: 0 0 0 1px rgba(232,130,12,0.3), 0 8px 32px rgba(0,0,0,0.6); }
        /* Input focus ring */
        input:focus, textarea:focus { box-shadow: 0 0 0 2px rgba(232,130,12,0.25); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ---------- Parser & Generator (preserve exact structure) ----------

        // Matches: [Name | Type | Location, *Name | Type | Location *, Name | Type | Location
        const EVENT_RE = /^\s*[\[*]?\s*(.+?)\s*\|\s*(.+?)\s*\|\s*(.+?)\s*[*]?\s*$/;
        const TASK_RE = /^\s*(?:[•\-])/;
        const TASKS_HEADER_RE = /^\s*משימות\s*:/;
        const GENERAL_TASKS_HEADER_RE = /^\s*משימות\s*כללי\s*:/;

        const rid = () => Math.random().toString(36).slice(2, 10);

        // Detects valid 24-hour times (00:00–23:59) in task text
        const TIME_RE = /\b((?:[01]?\d|2[0-3]):[0-5]\d)\b/;
        const normalizeTime = t => { const [h, m] = t.split(':'); return `${h.padStart(2,'0')}:${m}`; };

        const getTodayStr = () => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; };
        const getTomorrowStr = () => { const n = new Date(); n.setDate(n.getDate()+1); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; };
        const getCurrentTimeStr = () => { const n = new Date(); return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`; };

        const resolveTaskDate = (time, text, explicitDate) => {
            if (explicitDate) return explicitDate;
            const hasMachar = /מחר/.test(text);
            if (hasMachar || time <= getCurrentTimeStr()) return getTomorrowStr();
            return getTodayStr();
        };

        const getScheduledTasks = (state) => {
            const result = [];
            const activeIncs = (state.incidents || []).filter(i => !i.closed);
            for (const inc of activeIncs) {
                for (const task of inc.tasks.filter(t => !t.done)) {
                    let time = task.scheduledTime ? normalizeTime(task.scheduledTime) : null;
                    if (!time) { const m = task.text.match(TIME_RE); if (m) time = normalizeTime(m[1]); }
                    if (!time) continue;
                    const date = resolveTaskDate(time, task.text, task.scheduledDate || null);
                    result.push({ taskId: task.id, incidentId: inc.id, incidentName: inc.name, time, date, text: task.text, source: 'incident' });
                }
            }
            for (const task of (state.generalTasks || []).filter(t => !t.done)) {
                let time = task.scheduledTime ? normalizeTime(task.scheduledTime) : null;
                if (!time) { const m = task.text.match(TIME_RE); if (m) time = normalizeTime(m[1]); }
                if (!time) continue;
                const date = resolveTaskDate(time, task.text, task.scheduledDate || null);
                result.push({ taskId: task.id, incidentId: null, incidentName: 'משימות כלליות', time, date, text: task.text, source: 'general' });
            }
            for (const task of (state.manualScheduledTasks || [])) {
                const date = task.date || resolveTaskDate(task.time, task.text || '', null);
                result.push({ taskId: task.id, incidentId: null, incidentName: 'ידני', time: task.time, date, text: task.text, source: 'manual' });
            }
            result.sort((a, b) => {
                const dc = (a.date || '').localeCompare(b.date || '');
                if (dc !== 0) return dc;
                const [ah, am] = a.time.split(':').map(Number);
                const [bh, bm] = b.time.split(':').map(Number);
                return (ah * 60 + am) - (bh * 60 + bm);
            });
            return result;
        };

        const parseProtocol = (raw) => {
            const state = { prefix: '', suffix: '', incidents: [] };
            if (!raw || !raw.trim()) return state;

            // Pre-pass: extract general tasks section from anywhere in the input
            let genHeader = null;
            let genTasks = [];
            let genTrailing = [];
            let inGen = false;
            const remainingLines = [];
            for (const line of raw.split('\n')) {
                const t = line.trim();
                if (GENERAL_TASKS_HEADER_RE.test(t)) {
                    genHeader = line;
                    inGen = true;
                } else if (inGen && TASK_RE.test(t)) {
                    genTasks.push({
                        id: rid(),
                        rawLine: line,
                        text: t.replace(/^[•\-]\s*/, '').replace(/^[\s\u2060\u2063⁠]+/, '').trim(),
                        done: false,
                    });
                } else if (inGen && t === '') {
                    genTrailing.push(line);
                } else {
                    if (inGen && t !== '') inGen = false;
                    remainingLines.push(line);
                }
            }
            state.generalTasksHeaderLine = genHeader;
            state.generalTasks = genTasks;
            state.generalTasksTrailingLines = genTrailing;

            // Main pass: parse events from the remaining lines
            let prefixLines = [];
            let suffixLines = [];
            let current = null;
            let section = 'details';
            let phase = 'prefix';

            const flush = () => { if (current) state.incidents.push(current); current = null; };

            for (const line of remainingLines) {
                const trimmed = line.trim();
                const m = trimmed.match(EVENT_RE);

                if (m) {
                    flush();
                    phase = 'events';
                    current = {
                        id: rid(),
                        rawHeader: line,
                        name: m[1].trim(),
                        type: m[2].trim(),
                        location: m[3].trim(),
                        detailLines: [],
                        newDetailIds: [],
                        tasksHeaderLine: null,
                        tasks: [],
                        trailingLines: [],
                        closed: false,
                    };
                    section = 'details';
                    continue;
                }

                if (phase === 'prefix') { prefixLines.push(line); continue; }

                if (phase === 'events' && trimmed.startsWith(']')) {
                    flush();
                    phase = 'suffix';
                    suffixLines.push(line);
                    continue;
                }
                if (phase === 'suffix') { suffixLines.push(line); continue; }

                if (!current) continue;

                if (TASKS_HEADER_RE.test(trimmed)) {
                    current.tasksHeaderLine = line;
                    section = 'tasks';
                    continue;
                }

                if (section === 'tasks') {
                    if (TASK_RE.test(trimmed)) {
                        current.tasks.push({
                            id: rid(),
                            rawLine: line,
                            text: trimmed.replace(/^[•\-]\s*/, '').replace(/^[\s\u2060\u2063⁠]+/, '').trim(),
                            done: false,
                        });
                    } else if (trimmed === '') {
                        current.trailingLines.push(line);
                    } else if (current.tasks.length > 0) {
                        const last = current.tasks[current.tasks.length - 1];
                        last.rawLine = last.rawLine + '\n' + line;
                        last.text = (last.text + ' ' + trimmed).trim();
                    } else {
                        current.trailingLines.push(line);
                    }
                } else {
                    current.detailLines.push(line);
                }
            }
            flush();
            state.prefix = prefixLines.join('\n');
            state.suffix = suffixLines.join('\n');
            return state;
        };

        const generateProtocol = (state) => {
            const parts = [];
            if (state.prefix !== '') parts.push(state.prefix);

            const openIncidents = state.incidents.filter(i => !i.closed);
            openIncidents.forEach(inc => {
                parts.push(inc.rawHeader);
                if (inc.detailLines.length) parts.push(inc.detailLines.join('\n'));
                const openTasks = inc.tasks.filter(t => !t.done);
                if (inc.tasksHeaderLine !== null) {
                    parts.push(inc.tasksHeaderLine);
                    openTasks.forEach(t => parts.push(t.rawLine));
                    if (inc.trailingLines.length) parts.push(inc.trailingLines.join('\n'));
                } else if (openTasks.length > 0) {
                    parts.push('משימות:');
                    openTasks.forEach(t => parts.push(t.rawLine));
                }
            });

            if (state.suffix !== '') parts.push(state.suffix);

            const openGenTasks = (state.generalTasks || []).filter(t => !t.done);
            if (openGenTasks.length > 0) {
                parts.push(state.generalTasksHeaderLine || 'משימות כללי:');
                openGenTasks.forEach(t => parts.push(t.rawLine));
                if (state.generalTasksTrailingLines && state.generalTasksTrailingLines.length)
                    parts.push(state.generalTasksTrailingLines.join('\n'));
            }

            return parts.join('\n');
        };

        // ---------- NLP: detect task completion ----------

        const DONE_RE = /\b(done|closed|complete[d]?|fixed)\b|בוצע(ה|ו)?|הסתיים(ה|ו)?|הושלם(ה|ו)?|טופל(ה|ו)?|נסגר(ה|ו)?|סיימנו|סיימתי|סומן(ה|ו)?\s*(כ)?בוצע/i;

        const tokenize = (s) => (s || '')
            .replace(/[.,:;!?"'״׳()\[\]]/g, ' ')
            .split(/\s+/)
            .filter(w => w.length >= 2);

        const detectTaskCompletion = (input, openTasks) => {
            if (!openTasks.length) return null;
            if (!DONE_RE.test(input)) return null;

            const cleaned = input.replace(DONE_RE, ' ').trim();
            const inputTokens = tokenize(cleaned);

            let best = null;
            let bestScore = 0;

            for (const task of openTasks) {
                const taskTokens = tokenize(task.text);
                if (!taskTokens.length) continue;
                let matches = 0;
                for (const it of inputTokens) {
                    if (taskTokens.some(tt => tt === it || tt.includes(it) || it.includes(tt))) matches++;
                }
                const score = matches / Math.max(taskTokens.length, 1);
                if (score > bestScore) { bestScore = score; best = task; }
            }

            // if no content beyond the "done" keyword and only one open task → mark it
            if (!inputTokens.length && openTasks.length === 1) return openTasks[0];
            if (bestScore >= 0.25) return best;
            return null;
        };

        // ---------- Components ----------

        const AddIncidentModal = ({ onClose, onAdd }) => {
            const [name, setName] = useState('');
            const [type, setType] = useState('');
            const [location, setLocation] = useState('');
            const [details, setDetails] = useState('');
            const [tasks, setTasks] = useState('');

            const submit = () => {
                if (!name.trim() || !type.trim() || !location.trim()) return;
                onAdd({ name: name.trim(), type: type.trim(), location: location.trim(), details, tasks });
            };

            return (
                <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-50 p-4" onClick={onClose}>
                    <div className="bg-mn-800 border border-mn-600 rounded p-6 w-full max-w-lg shadow-2xl" onClick={e => e.stopPropagation()}>
                        <h3 className="text-lg font-black mb-4 text-mn-gold uppercase tracking-wider">הוספת אירוע חדש</h3>
                        <div className="space-y-3">
                            <input value={name} onChange={e => setName(e.target.value)} placeholder="שם"
                                className="w-full bg-mn-950 border border-mn-700 rounded px-3 py-2 text-sm outline-none focus:border-mn-gold text-mn-t placeholder:text-mn-td"/>
                            <input value={type} onChange={e => setType(e.target.value)} placeholder="סוג פעולה (למשל: חילוץ)"
                                className="w-full bg-mn-950 border border-mn-700 rounded px-3 py-2 text-sm outline-none focus:border-mn-gold text-mn-t placeholder:text-mn-td"/>
                            <input value={location} onChange={e => setLocation(e.target.value)} placeholder="מיקום"
                                className="w-full bg-mn-950 border border-mn-700 rounded px-3 py-2 text-sm outline-none focus:border-mn-gold text-mn-t placeholder:text-mn-td"/>
                            <textarea value={details} onChange={e => setDetails(e.target.value)} placeholder="פרטים (שורה אחר שורה)"
                                rows="5"
                                className="w-full bg-mn-950 border border-mn-700 rounded px-3 py-2 text-sm outline-none focus:border-mn-gold text-mn-t placeholder:text-mn-td"/>
                            <textarea value={tasks} onChange={e => setTasks(e.target.value)} placeholder="משימות (שורה אחר שורה)"
                                rows="3"
                                className="w-full bg-mn-950 border border-mn-700 rounded px-3 py-2 text-sm outline-none focus:border-mn-gold text-mn-t placeholder:text-mn-td"/>
                        </div>
                        <div className="flex gap-2 mt-5">
                            <button onClick={submit} className="flex-1 bg-mn-gold hover:bg-mn-goldh text-mn-950 py-2.5 rounded font-black uppercase tracking-wider">הוסף</button>
                            <button onClick={onClose} className="px-4 bg-mn-700 hover:bg-mn-600 text-mn-t py-2.5 rounded">ביטול</button>
                        </div>
                    </div>
                </div>
            );
        };

        const OutputModal = ({ text, onClose }) => {
            const [copied, setCopied] = useState(false);
            const copy = () => {
                navigator.clipboard.writeText(text);
                setCopied(true);
                setTimeout(() => setCopied(false), 1500);
            };
            return (
                <div className="fixed inset-0 bg-black/75 flex items-center justify-center z-50 p-4" onClick={onClose}>
                    <div className="bg-mn-800 border border-mn-600 rounded p-6 w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl" onClick={e => e.stopPropagation()}>
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold text-emerald-400">פלט סופי</h3>
                            <button onClick={onClose} className="text-mn-tm hover:text-white text-2xl leading-none">×</button>
                        </div>
                        <pre className="bg-mn-950 border border-mn-700 rounded p-5 font-mono text-sm whitespace-pre-wrap text-mn-t flex-1 overflow-auto scroll-thin">{text}</pre>
                        <button onClick={copy} className={`mt-4 py-3 rounded font-bold uppercase tracking-wider transition-colors ${copied ? 'bg-emerald-500' : 'bg-emerald-600 hover:bg-emerald-500'}`}>
                            {copied ? 'הועתק ✓' : 'העתק ללוח'}
                        </button>
                    </div>
                </div>
            );
        };

        const GeneralTasksPanel = ({ tasks, onToggleTask }) => {
            const [inputVal, setInputVal] = useState('');
            const [flash, setFlash] = useState(null);
            const [fadingIds, setFadingIds] = useState([]);

            const openTasks = (tasks || []).filter(t => !t.done);

            const handleSubmit = () => {
                const text = inputVal.trim();
                if (!text) return;
                const matched = detectTaskCompletion(text, openTasks);
                setInputVal('');
                if (matched) {
                    setFadingIds(prev => [...prev, matched.id]);
                    setFlash(matched.text);
                    setTimeout(() => onToggleTask(matched.id), 300);
                    setTimeout(() => setFlash(null), 2000);
                }
            };

            return (
                <div className="w-64 bg-mn-800 border border-mn-600 rounded p-4" style={{borderRightWidth:'4px',borderRightColor:'#E8820C'}}>
                    <p className="text-[11px] font-bold text-amber-500 uppercase tracking-widest mb-3">
                        משימות כלליות ({openTasks.length})
                    </p>
                    {openTasks.length === 0 ? (
                        <p className="text-xs text-mn-td italic">אין משימות כלליות</p>
                    ) : (
                        <>
                            <div className="flex flex-col gap-y-1.5 mb-3">
                                {openTasks.map(t => (
                                    <label key={t.id} className={`flex items-start gap-2 cursor-pointer group ${fadingIds.includes(t.id) ? 'task-fade' : ''}`}>
                                        <input type="checkbox" checked={false}
                                            onChange={() => {
                                                setFadingIds(prev => [...prev, t.id]);
                                                setTimeout(() => onToggleTask(t.id), 300);
                                            }}
                                            className="mt-0.5 rounded bg-mn-700 border-mn-600 text-amber-500"/>
                                        <span className="text-xs text-mn-t group-hover:text-white leading-snug">{t.text}</span>
                                    </label>
                                ))}
                            </div>
                            <div className="pt-2 border-t border-mn-600">
                                <input
                                    type="text"
                                    value={inputVal}
                                    onChange={e => setInputVal(e.target.value)}
                                    onKeyDown={e => { if (e.key === 'Enter') handleSubmit(); }}
                                    placeholder='סמן משימה כבוצעה...'
                                    className="w-full bg-mn-950 border border-mn-700 rounded px-3 py-2 text-xs focus:border-amber-500 outline-none text-mn-t placeholder:text-mn-td"
                                />
                                {flash && (
                                    <div className="mt-2 text-[11px] px-2 py-1 rounded bg-amber-900/50 text-amber-300">
                                        ✓ משימה סומנה כבוצעה: {flash}
                                    </div>
                                )}
                            </div>
                        </>
                    )}
                </div>
            );
        };

        const IncidentCard = ({ incident, onAddUpdate, onAddTask, onToggleTask, onClose, onEditDetailLine, onEditTask, onDeleteDetailLine, onDeleteTask }) => {
            const [flash, setFlash] = useState(null);
            const [updateVal, setUpdateVal] = useState('');
            const [taskVal, setTaskVal] = useState('');
            const [taskDate, setTaskDate] = useState('');
            const [taskTime, setTaskTime] = useState('');
            const [fadingTaskIds, setFadingTaskIds] = useState([]);
            const [editingDetail, setEditingDetail] = useState(null);
            const [editingTask, setEditingTask] = useState(null);

            const openTasks = incident.tasks.filter(t => !t.done);
            const doneTasks = incident.tasks.filter(t => t.done);

            const handleAddUpdate = () => {
                const text = updateVal.trim();
                if (!text) return;
                onAddUpdate(incident.id, text);
                setUpdateVal('');
                setFlash({ type: 'detail', text });
                setTimeout(() => setFlash(null), 2000);
            };

            const handleAddTask = () => {
                const text = taskVal.trim();
                if (!text) return;
                onAddTask(incident.id, text, taskDate || null, taskTime || null);
                setTaskVal('');
                setTaskDate('');
                setTaskTime('');
                const hasTime = taskTime || TIME_RE.test(text);
                setFlash({ type: 'task-added', text, hasTime: !!hasTime });
                setTimeout(() => setFlash(null), 2500);
            };

            const confirmClose = () => {
                if (window.confirm(`לסגור את האירוע: ${incident.name}?`)) onClose(incident.id);
            };

            const commitDetailEdit = (idx, value) => {
                if (value.trim()) onEditDetailLine(incident.id, idx, value);
                setEditingDetail(null);
            };

            const commitTaskEdit = (id, value) => {
                if (value.trim()) onEditTask(incident.id, id, value);
                setEditingTask(null);
            };

            return (
                <div className={`incident-card bg-mn-800 rounded p-5 shadow-2xl border border-mn-600 border-r-4 border-r-mn-gold ${incident.closed ? 'closed-event' : ''}`}>
                    <div className="flex justify-between items-start mb-3 gap-2">
                        <div className="min-w-0">
                            <div className="flex items-center gap-2 mb-1">
                                <span className="text-[10px] font-black text-mn-gold uppercase tracking-widest">{incident.type}</span>
                                {incident.closed && <span className="text-[9px] font-bold px-2 py-0.5 bg-mn-600/60 text-mn-td rounded uppercase tracking-widest">סגור</span>}
                            </div>
                            <h3 className="text-lg font-bold truncate text-mn-t">{incident.name}</h3>
                            <p className="text-xs text-mn-td truncate">📍 {incident.location}</p>
                        </div>
                        {!incident.closed && <button onClick={confirmClose}
                            className="text-xs px-2.5 py-1 bg-mn-700 hover:bg-red-600/80 text-mn-tm hover:text-white rounded-md font-bold shrink-0">
                            סגור אירוע
                        </button>}
                    </div>

                    <details className="mb-3 group" open>
                        <summary className="text-[11px] font-bold text-mn-td uppercase tracking-wider mb-2 flex items-center gap-1">
                            <span className="group-open:rotate-90 inline-block transition-transform">▸</span>
                            פרטים ({incident.detailLines.length})
                        </summary>
